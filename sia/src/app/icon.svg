<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#197fe6"/>
  <!-- Hub icon (Material Symbols style) -->
  <!-- Center node -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <!-- Top node -->
  <circle cx="16" cy="7" r="2.5" fill="white"/>
  <!-- Bottom-left node -->
  <circle cx="8.5" cy="23.5" r="2.5" fill="white"/>
  <!-- Bottom-right node -->
  <circle cx="23.5" cy="23.5" r="2.5" fill="white"/>
  <!-- Connector: center to top -->
  <line x1="16" y1="9.5" x2="16" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Connector: center to bottom-left -->
  <line x1="10.3" y1="21.8" x2="13.7" y2="18.3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Connector: center to bottom-right -->
  <line x1="21.7" y1="21.8" x2="18.3" y2="18.3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
